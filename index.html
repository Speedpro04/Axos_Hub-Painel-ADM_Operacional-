
<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Axos Hub - Painel Adm Inteligente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #f1f5f9;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      .premium-gradient {
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      }
      
      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 20px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }

      /* Animação Stagger para Cards */
      @keyframes stagger-in {
        from {
          opacity: 0;
          transform: translateY(20px) scale(0.95);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      .animate-stagger-item {
        opacity: 0;
        animation: stagger-in 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      /* Hover suave nos cards */
      .card-hover-lift {
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .card-hover-lift:hover {
        transform: translateY(-4px);
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 
                    0 10px 10px -5px rgba(0, 0, 0, 0.04);
      }

      /* Animação de pulse para sync status */
      @keyframes pulse-glow {
        0%, 100% {
          opacity: 1;
          box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4);
        }
        50% {
          opacity: 0.8;
          box-shadow: 0 0 0 10px rgba(59, 130, 246, 0);
        }
      }

      .animate-pulse-glow {
        animation: pulse-glow 2s ease-in-out infinite;
      }
    </style>
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom": "https://esm.sh/react-dom@^19.2.4",
    "react-dom/client": "https://esm.sh/react-dom@^19.2.4/client",
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.41.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.564.0",
    "zustand": "https://esm.sh/zustand@^5.0.0",
    "react-hot-toast": "https://esm.sh/react-hot-toast@^2.4.1",
    "use-debounce": "https://esm.sh/use-debounce@^10.0.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "zustand/": "https://esm.sh/zustand@^5.0.11/"
  }
}
</script>
  </head>

    <div id="root"></div>
  </body>
</html>
